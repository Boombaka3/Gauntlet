services:
  - type: web
    name: evidencetrace
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: evidencetrace-db
          property: connectionString
      - key: REDIS_URL
        value: disabled
      - key: OPENAI_COMPAT_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: NAVIGATOR_MODEL
        value: llama-3.3-70b-versatile
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: evidencetrace-prod
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: GAUNTLET_TENANT_SCHEMA
        value: demo
      - key: GAUNTLET_TENANT_DOMAIN
        sync: false

databases:
  - name: evidencetrace-db
    plan: free
